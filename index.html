<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analyzer</title>
</head>
<body>

<h1>AI Sentiment Analyzer</h1>

<form method="POST">
    <textarea name="text" placeholder="Enter text..." required></textarea><br><br>
    <button type="submit">Analyze</button>
</form>

{% if result %}
    <h2>Result:</h2>
    <p>Sentiment: {{ result.label }}</p>
    <p>Confidence: {{ result.score }}</p>
{% endif %}

<h2>Past Reviews</h2>
<ul>
    {% for r in reviews %}
        <li>{{ r.text }} → {{ r.sentiment }}</li>
    {% endfor %}
</ul>

</body>
</html>
